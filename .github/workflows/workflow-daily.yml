name: Actualitza feeds diaris

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 14h Menorca (UTC+2 estiu) / 13h UTC+1 hivern — cobert per check
  workflow_dispatch:

jobs:
  update-radioestel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera feed Ràdio Estel
        run: python scraper.py --feed "Tecnologia - Ràdio Estel" --output docs

      - name: Publica canvis
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎙️ Feed actualitzat: Ràdio Estel Tecnologia"
          file_pattern: "docs/*.xml"
