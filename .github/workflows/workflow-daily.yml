name: Actualitza feeds diaris

on:
  schedule:
    - cron: "0 7 * * *"   # Cada dia a les 7h UTC
  workflow_dispatch:       # Permet executar-lo manualment

jobs:
  update-radioestel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera feed Ràdio Estel
        run: python scraper.py --feed "Tecnologia - Ràdio Estel" --output docs

      - name: Publica canvis
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎙️ Feed actualitzat: Ràdio Estel Tecnologia"
          file_pattern: "docs/*.xml"
