name: Actualitza feeds IB3 Menorca

on:
  schedule:
    #                   9:00  9:30  10:00 10:30 15:00 15:30 16:00 16:30  (hora Menorca estiu UTC+2)
    #          UTC:     7:00  7:30   8:00  8:30 13:00 13:30 14:00 14:30
    # hora hivern UTC+1:8:00  8:30   9:00  9:30 14:00 14:30 15:00 15:30
    - cron: "0,30 7,8,13,14 * * 1-5"
  workflow_dispatch:

jobs:
  update-ib3:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera feed IB3 Menorca
        run: python scraper.py --feed "Informatius Menorca - IB3" --output docs --check-schedule

      - name: Publica canvis
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎙️ Feed actualitzat: IB3 Informatius Menorca"
          file_pattern: "docs/*.xml"
