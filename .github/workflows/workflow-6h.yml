name: Actualitza feeds IB3 Menorca

on:
  schedule:
    - cron: "0,30 7,8,13,14 * * 1-5"
  workflow_dispatch:

jobs:
  update-ib3:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera feed IB3 Menorca (programat)
        if: github.event_name == 'schedule'
        run: python scraper.py --feed "Informatius Menorca - IB3" --output docs --check-schedule

      - name: Genera feed IB3 Menorca (manual)
        if: github.event_name == 'workflow_dispatch'
        run: python scraper.py --feed "Informatius Menorca - IB3" --output docs

      - name: Publica canvis
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎙️ Feed actualitzat: IB3 Informatius Menorca"
          file_pattern: "docs/*.xml"
