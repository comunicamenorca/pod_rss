name: Actualitza feeds IB3 Menorca

on:
  schedule:
    # Executa cada hora entre les 7-16 UTC (cobreix 9-18h hora espanyola)
    # per poder comprovar dins l'script si és l'hora correcta
    - cron: "0 7,8,9,13,14,15 * * 1-5"
  workflow_dispatch:  # Permet executar-lo manualment

jobs:
  update-ib3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera feed IB3 Menorca
        run: python scraper.py --feed "Informatius Menorca - IB3" --output docs --check-schedule

      - name: Publica canvis
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎙️ Feed actualitzat: IB3 Informatius Menorca"
          file_pattern: "docs/*.xml"
